services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: monitor_pncp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/monitor_pncp?schema=public
      PNCP_BASE_URL: https://pncp.gov.br/api/consulta
      PNCP_CONTRACTING_BY_DATE_PATH: /v1/contratacoes/publicacao
      SYNC_DEFAULT_DAYS_BACK: 3
    depends_on:
      - db
    ports:
      - "3001:3001"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:3001
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
